<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Passport Photo Maker - i10 Image Tools</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f4f8;
}

.header{
background:#2d5cff;
color:white;
padding:15px;
font-size:22px;
display:flex;
justify-content:space-between;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
text-align:center;
}

.upload-box{
border:3px dashed #2d5cff;
padding:60px;
background:white;
border-radius:8px;
}

.upload-btn{
padding:12px 25px;
background:#1abc9c;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

.size-panel{
display:none;
margin-top:30px;
background:white;
padding:20px;
border-radius:8px;
}

.size-option{
border:1px solid #ddd;
padding:10px;
margin:10px;
cursor:pointer;
}

.crop-area{
display:none;
margin-top:30px;
}

.canvas-box{
width:300px;
height:380px;
border:2px solid #000;
margin:auto;
overflow:hidden;
}

canvas{
width:100%;
}

.controls button{
padding:10px 20px;
margin:10px;
background:#2d5cff;
color:white;
border:none;
}

.background-step{
display:none;
margin-top:40px;
}

.bg-container{
display:flex;
gap:30px;
justify-content:center;
flex-wrap:wrap;
}

.preview-box{
background:white;
padding:20px;
border-radius:8px;
}

.color-picker{
margin-top:15px;
}

.text-box{
display:none;
margin-top:20px;
}

.download-step{
display:none;
margin-top:40px;
}

.download-container{
display:flex;
gap:30px;
justify-content:center;
flex-wrap:wrap;
}

.sheet-box{
background:white;
padding:20px;
border-radius:8px;
width:350px;
}

.bottom-buttons{
margin-top:20px;
}

.bottom-buttons button{
padding:12px 25px;
margin:10px;
background:#2d5cff;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<div>i10 IMAGE TOOLS</div>
<div>☰</div>

</div>

<div class="container">

<h2>Passport Photo Maker</h2>

<div class="upload-box">

<input type="file" id="imageInput" hidden accept="image/*">

<button class="upload-btn" onclick="document.getElementById('imageInput').click()">
Select Image
</button>

</div>


<div class="size-panel" id="sizePanel">

<h3>Select Passport Size</h3>

<div class="size-option" onclick="startCrop()">35 × 45 mm</div>
<div class="size-option" onclick="startCrop()">2 × 2 inch</div>
<div class="size-option" onclick="startCrop()">50 × 70 mm</div>

</div>


<div class="crop-area" id="cropArea">

<h3>Crop Face</h3>

<div class="canvas-box">
<canvas id="canvas"></canvas>
</div>

<div class="controls">
<button onclick="zoomIn()">+</button>
<button onclick="zoomOut()">-</button>
</div>

<div class="bottom-buttons">

<button onclick="backToSize()">Back</button>
<button onclick="goBackground()">Save & Next</button>

</div>

</div>


<div class="background-step" id="backgroundStep">

<h3>Background</h3>

<div class="bg-container">

<div class="preview-box">

<p>Original</p>

<canvas id="originalCanvas" width="300" height="380"></canvas>

</div>

<div class="preview-box">

<p>Background</p>

<canvas id="bgCanvas" width="300" height="380"></canvas>

<div class="color-picker">

<input type="color" id="bgColor" value="#ffffff">

</div>

</div>

</div>


<label>

<input type="checkbox" onclick="showTextBox()">

Write Name & Date on Image

</label>

<div class="text-box" id="textBox">

<input type="text" id="nameInput" placeholder="Enter Name">

<input type="date" id="dateInput">

</div>


<div class="bottom-buttons">

<button onclick="backToCrop()">Back</button>

<button onclick="goDownload()">Save & Next</button>

</div>

</div>


<div class="download-step" id="downloadStep">

<h3>Download</h3>

<div class="download-container">

<div class="sheet-box">

<h4>Online Submission</h4>

<button onclick="downloadSingle()">Download Photo</button>

</div>

<div class="sheet-box">

<h4>Print Sheet</h4>

<select id="sheetType">

<option value="a4">A4</option>

<option value="3a4">3/A4</option>

<option value="custom">Custom</option>

</select>

<br><br>

<button onclick="downloadSheet()">Download Sheet</button>

</div>

</div>

<div class="bottom-buttons">

<button onclick="backToBackground()">Back</button>

</div>

</div>

</div>


<script>

let imageInput=document.getElementById("imageInput");
let sizePanel=document.getElementById("sizePanel");
let cropArea=document.getElementById("cropArea");
let backgroundStep=document.getElementById("backgroundStep");
let downloadStep=document.getElementById("downloadStep");

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

let originalCanvas=document.getElementById("originalCanvas");
let octx=originalCanvas.getContext("2d");

let bgCanvas=document.getElementById("bgCanvas");
let bgctx=bgCanvas.getContext("2d");

let img=new Image();

let scale=1;

imageInput.addEventListener("change",function(){

let file=this.files[0];

if(file){

let reader=new FileReader();

reader.onload=function(e){

img.src=e.target.result;

}

reader.readAsDataURL(file);

sizePanel.style.display="block";

}

});


function startCrop(){

sizePanel.style.display="none";

cropArea.style.display="block";

canvas.width=300;
canvas.height=380;

img.onload=function(){

drawImage();

}

}


function drawImage(){

ctx.clearRect(0,0,canvas.width,canvas.height);

let w=img.widthscale;
let h=img.heightscale;

ctx.drawImage(img,(canvas.width-w)/2,(canvas.height-h)/2,w,h);

}


function zoomIn(){

scale+=0.1;

drawImage();

}

function zoomOut(){

scale-=0.1;

if(scale<0.2){

scale=0.2;

}

drawImage();

}


function backToSize(){

cropArea.style.display="none";
sizePanel.style.display="block";

}

function goBackground(){

cropArea.style.display="none";
backgroundStep.style.display="block";

octx.drawImage(canvas,0,0);

bgctx.fillStyle=document.getElementById("bgColor").value;

bgctx.fillRect(0,0,300,380);

bgctx.drawImage(canvas,0,0);

}


document.getElementById("bgColor").addEventListener("input",function(){

bgctx.fillStyle=this.value;

bgctx.fillRect(0,0,300,380);

bgctx.drawImage(canvas,0,0);

});


function showTextBox(){

let box=document.getElementById("textBox");

box.style.display=box.style.display=="none"?"block":"none";

}


function goDownload(){

backgroundStep.style.display="none";
downloadStep.style.display="block";

}


function backToCrop(){

backgroundStep.style.display="none";
cropArea.style.display="block";

}

function backToBackground(){

downloadStep.style.display="none";
backgroundStep.style.display="block";

}


function downloadSingle(){

let link=document.createElement("a");

link.download="passport-photo.png";

link.href=bgCanvas.toDataURL();

link.click();

}


function downloadSheet(){

let sheet=document.createElement("canvas");

let sctx=sheet.getContext("2d");

sheet.width=1200;

sheet.height=1700;

for(let y=0;y<5;y++){

for(let x=0;x<3;x++){

sctx.drawImage(bgCanvas,x350+50,y320+50,300,380);

}

}

let link=document.createElement("a");

link.download="passport-sheet.png";

link.href=sheet.toDataURL();
  </script>
</body>
</html>
