<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>i10 Animation</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:white;
}

svg{
width:320px;
}

/* DOT */

#dot{
transform:scale(0);
transform-origin:center;
animation:dotPop 0.6s forwards;
}

@keyframes dotPop{
to{transform:scale(1);}
}

/* i line */

#i-line{
stroke-dasharray:200;
stroke-dashoffset:200;
animation:draw 0.7s forwards;
animation-delay:0.6s;
}

/* 1 draw */

#one{
stroke-dasharray:300;
stroke-dashoffset:300;
animation:draw 0.8s forwards;
animation-delay:1.3s;
}

/* 0 draw */

#zero{
stroke-dasharray:500;
stroke-dashoffset:500;
animation:draw 1s forwards;
animation-delay:2.1s;
}

/* bottom curve */

#curve{
stroke-dasharray:500;
stroke-dashoffset:500;
animation:draw 0.8s forwards;
animation-delay:3.2s;
}

@keyframes draw{
to{
stroke-dashoffset:0;
}
}

</style>

</head>

<body>

<svg viewBox="0 0 300 200" fill="none" stroke-width="10" stroke-linecap="round">

<!-- DOT -->

<circle id="dot" cx="60" cy="40" r="10" fill="#3db2ff"/>

<!-- I line -->

<line id="i-line" x1="60" y1="60" x2="60" y2="120" stroke="#3db2ff"/>

<!-- 1 -->

<path id="one" d="M110 120 L140 60 L140 120" stroke="#7b3fe4"/>

<!-- 0 -->

<circle id="zero" cx="200" cy="90" r="35" stroke="#e84aa8"/>

<!-- bottom curve -->

<path id="curve" d="M40 140 Q140 180 240 140" stroke="#4b5aa7"/>

</svg>

</body>
</html>
