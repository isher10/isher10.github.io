<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resize Image Online - i10Image Tools</title>

<meta name="description" content="Resize image online free using i10Image Tools. Change image width and height easily.">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h1>i10Image Tools</h1>
<p>Resize Image Tool</p>
</header>

<div class="container">

<h2>Resize Image</h2>

<p>Upload your image and set new width and height.</p>

<input type="file" id="upload">
  <div id="previewBox" style="margin-top:20px; text-align:center; display:none;">

<img id="previewImage" style="max-width:200px; border-radius:8px;"><br><br>

<p id="imageInfo"></p>

  </div>

<br><br>

<img id="preview" style="max-width:200px; display:none;">

<br><br>

<label>Width</label>
<input type="number" id="width" placeholder="Width">

<label>Height</label>
<input type="number" id="height" placeholder="Height">

<button id="lockBtn">🔒</button>

<select id="unit">
<option value="percent">Percent</option>
<option value="px">Pixels</option>
<option value="cm">Centimetres</option>
<option value="inch">Inches</option>
</select>

<br><br>

<label>Format</label>

<select id="format">
<option value="jpeg">JPG</option>
<option value="png">PNG</option>
<option value="gif">GIF</option>
</select>
  <input type="text" id="filename" placeholder="Enter file name" style="margin-top:10px;">

<label>Quality</label>
<input type="number" id="quality" value="90">

<label>Background</label>
<input type="color" id="background">

<br><br>

<button onclick="resizeImage()">Resize Image</button>

<br><br>

<a id="download" style="display:none;">Download Resized Image</a>

</div>

<footer>

<p>© 2026 i10Image Tools</p>

</footer>

<script src="script.js"></script>

</body>

</html>
